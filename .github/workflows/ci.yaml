name: ci

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Check lockstep package versions
        run: |
          SDK_VERSION=$(cd packages/v0-sdk && bun pm pkg get version | tr -d '"')
          CREATE_APP_VERSION=$(cd packages/create-v0-sdk-app && bun pm pkg get version | tr -d '"')
          if [ "$SDK_VERSION" != "$CREATE_APP_VERSION" ]; then
            echo "::error::v0 and create-v0-sdk-app versions must match (${SDK_VERSION} != ${CREATE_APP_VERSION})."
            exit 1
          fi
      - run: bun run lint
      - run: bun run fmt:check
      - run: bun run generate
      - run: bun run build
      - run: bun run typecheck
      - run: bun run test

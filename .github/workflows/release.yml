name: release

on:
  push:
    branches:
      - main
      - v2
  schedule:
    - cron: '0 0 * * *'

jobs:
  # Temporary v2 canary lane: backend automation pushes updated openapi.json and
  # generated SDK changes to v2, then this verifies the checked-in SDK is current
  # and publishes a commit-specific npm canary.
  canary:
    if: ${{ github.ref == 'refs/heads/v2' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Build SDK
        run: |
          bun run generate
          bun run build
      - name: Check generated SDK is up to date
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Generated SDK is out of date. Run 'bun run generate && bun run build' and commit the changes."
            git status --short
            git diff --stat
            git diff
            exit 1
          fi
      - name: Resolve canary version
        id: version
        run: |
          cd packages/v0-sdk
          NAME=$(bun pm pkg get name | tr -d '"')
          BASE_VERSION=$(bun pm pkg get version | tr -d '"')
          SHA=$(git rev-parse --short HEAD)
          VERSION="${BASE_VERSION}-canary.${SHA}"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Check published canary
        id: published
        run: |
          if npm view "${{ steps.version.outputs.name }}@${{ steps.version.outputs.version }}" version --silent > /dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.published.outputs.skip != 'true'
        run: |
          cd packages/v0-sdk
          bun pm pkg set "version=${{ steps.version.outputs.version }}"
      - if: steps.published.outputs.skip != 'true'
        run: npm publish --tag canary --workspace packages/v0-sdk

  # Nightly stable release lane: main remains the source for latest releases.
  # If main has commits since the last version tag, this opens one PR containing
  # only the package version and lockfile bump; an existing PR for that version
  # is left in place while more main changes can continue landing.
  version-pr:
    if: ${{ github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      - name: Check commits since last version
        id: changes
        run: |
          LAST_VERSION=$(git describe --tags --abbrev=0 --match 'v[0-9]*' --match 'v0-sdk@*' 2>/dev/null || true)

          if [ -z "$LAST_VERSION" ]; then
            echo "No version tag found; continuing with release PR."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMITS=$(git rev-list "${LAST_VERSION}..HEAD" --count)
          echo "last_version=${LAST_VERSION}" >> "$GITHUB_OUTPUT"
          echo "commits=${COMMITS}" >> "$GITHUB_OUTPUT"

          if [ "$COMMITS" -eq 0 ]; then
            echo "No commits since ${LAST_VERSION}; skipping release PR."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "${COMMITS} commits since ${LAST_VERSION}; continuing with release PR."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v6
        if: steps.changes.outputs.skip != 'true'
        with:
          node-version: '24'
          package-manager-cache: false
      - uses: oven-sh/setup-bun@v2
        if: steps.changes.outputs.skip != 'true'
      - if: steps.changes.outputs.skip != 'true'
        run: bun install --frozen-lockfile
      - name: Bump package version
        id: bump
        if: steps.changes.outputs.skip != 'true'
        env:
          BUMP: patch
        run: |
          cd packages/v0-sdk
          bun pm version "$BUMP" --no-git-tag-version
          NAME=$(bun pm pkg get name | tr -d '"')
          VERSION=$(bun pm pkg get version | tr -d '"')
          cd ../..
          bun install --lockfile-only
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Check published latest
        id: published
        if: steps.changes.outputs.skip != 'true'
        run: |
          if npm view "${{ steps.bump.outputs.name }}@${{ steps.bump.outputs.version }}" version --silent > /dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Check for existing release PR
        id: existing
        if: steps.changes.outputs.skip != 'true' && steps.published.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh pr list --state open --search "Release v${{ steps.bump.outputs.version }} in:title" --json number --jq '.[0].number // ""')
          if [ -n "$PR" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Open release PR
        if: steps.changes.outputs.skip != 'true' && steps.published.outputs.skip != 'true' && steps.existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          NAME="${{ steps.bump.outputs.name }}"
          BRANCH="release/v${VERSION}-${GITHUB_RUN_ID}"

          git config user.name "v0[bot]"
          git config user.email "v0[bot]@users.noreply.github.com"
          git switch -c "$BRANCH"
          git add packages/v0-sdk/package.json bun.lock
          if git diff --cached --quiet; then
            echo "No release changes to commit."
            exit 0
          fi
          git commit -m "Release v${VERSION}"
          git push --set-upstream origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Release v${VERSION}" \
            --body "Bumps ${NAME} to v${VERSION}. Merge this PR to publish it from main."

  # Stable publish lane: when a release PR is manually merged to main, the bumped
  # package version is unpublished, so this publishes it to npm as latest and
  # creates the GitHub release. Other main pushes with an already-published
  # version skip release side effects.
  latest:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Resolve latest version
        id: version
        run: |
          cd packages/v0-sdk
          NAME=$(bun pm pkg get name | tr -d '"')
          VERSION=$(bun pm pkg get version | tr -d '"')
          COMMIT=$(git rev-parse HEAD)
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=${COMMIT}" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Check published latest
        id: published
        if: steps.version.outputs.prerelease != 'true'
        run: |
          if npm view "${{ steps.version.outputs.name }}@${{ steps.version.outputs.version }}" version --silent > /dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.version.outputs.prerelease != 'true' && steps.published.outputs.skip != 'true'
        run: npm publish --tag latest --workspace packages/v0-sdk
      - name: Check GitHub release
        id: release
        if: steps.version.outputs.prerelease != 'true' && steps.published.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.version.outputs.prerelease != 'true' && steps.published.outputs.skip != 'true' && steps.release.outputs.skip != 'true'
        run: gh release create "v${{ steps.version.outputs.version }}" --target "${{ steps.version.outputs.commit }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
